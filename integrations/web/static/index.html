<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Executive AI Dashboard</title>
  <style>
    :root {
      --bg:       #070e1a;
      --surface:  #0d1b2a;
      --surface2: #112236;
      --surface3: #172c43;
      --border:   #1e3a52;
      --border2:  #254e6e;
      --text:     #e2e8f0;
      --muted:    #6b8099;
      --accent:   #38bdf8;
      --green:    #4ade80;
      --yellow:   #fbbf24;
      --orange:   #fb923c;
      --red:      #f87171;
      --purple:   #a78bfa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      min-height: 100vh;
      padding-bottom: 4rem;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(180deg, #0a1525 0%, var(--surface) 100%);
      border-bottom: 1px solid var(--border);
      padding: .9rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-left { display: flex; flex-direction: column; gap: .15rem; }
    header h1 {
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: .02em;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    header h1 .logo { color: var(--accent); }
    #server-time {
      font-size: .68rem;
      color: var(--muted);
      font-family: "SF Mono", "Menlo", monospace;
    }
    .header-right { display: flex; align-items: center; gap: .6rem; }
    #refresh-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: .35rem .65rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: .72rem;
      transition: all .15s;
    }
    #refresh-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--surface3); }
    #refresh-btn.spinning { color: var(--accent); border-color: var(--accent); animation: spin .6s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ── Main ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.1rem 1rem;
    }

    /* ── Section label ── */
    .section-label {
      font-size: .62rem;
      letter-spacing: .12em;
      color: var(--muted);
      font-family: "SF Mono", "Menlo", monospace;
      text-transform: uppercase;
      margin: 0 0 .6rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .section-label::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Agent grid ── */
    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(272px, 1fr));
      gap: .7rem;
    }

    /* ── Agent card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.1rem;
      cursor: pointer;
      transition: border-color .18s, background .18s, transform .12s, box-shadow .18s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: transparent;
      transition: background .18s;
    }
    .card.status-ok::before    { background: var(--green); }
    .card.status-warn::before  { background: var(--yellow); }
    .card.status-gray::before  { background: var(--border2); }
    .card.status-green::before { background: var(--green); }
    .card.status-yellow::before { background: var(--yellow); }
    .card.status-orange::before { background: var(--orange); }

    .card:hover {
      border-color: var(--border2);
      background: var(--surface2);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .55rem;
    }
    .card-title {
      display: flex;
      align-items: center;
      gap: .45rem;
      font-size: .82rem;
      font-weight: 600;
      letter-spacing: .01em;
    }
    .card-icon { font-size: 1rem; line-height: 1; }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.ok     { background: var(--green); box-shadow: 0 0 6px rgba(74,222,128,.5); }
    .status-dot.warn   { background: var(--yellow); box-shadow: 0 0 8px rgba(251,191,36,.6); animation: pulse 2s infinite; }
    .status-dot.gray   { background: var(--muted); }
    .status-dot.green  { background: var(--green); box-shadow: 0 0 6px rgba(74,222,128,.5); }
    .status-dot.yellow { background: var(--yellow); box-shadow: 0 0 8px rgba(251,191,36,.6); }
    .status-dot.orange { background: var(--orange); box-shadow: 0 0 6px rgba(251,146,60,.4); }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: .4; }
    }
    .card-summary {
      font-size: .77rem;
      color: var(--muted);
      line-height: 1.45;
    }
    .card-extra {
      margin-top: .45rem;
    }
    .card-badge {
      display: inline-flex;
      align-items: center;
      gap: .25rem;
      font-size: .68rem;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .18rem .45rem;
      color: var(--accent);
      font-family: "SF Mono", "Menlo", monospace;
    }

    /* Deal items on card */
    .deal-list { margin-top: .4rem; display: flex; flex-direction: column; gap: .2rem; }
    .deal-item {
      font-size: .7rem;
      display: flex;
      gap: .35rem;
      align-items: center;
    }
    .deal-route { font-weight: 600; color: var(--text); }
    .deal-price { color: var(--yellow); font-family: "SF Mono", "Menlo", monospace; }
    .deal-meta  { color: var(--muted); font-size: .64rem; }

    /* ── Detail panel ── */
    #detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 200;
      backdrop-filter: blur(3px);
    }
    #detail-panel {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: min(440px, 100vw);
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      z-index: 201;
      transform: translateX(100%);
      transition: transform .22s cubic-bezier(.4,0,.2,1);
    }
    #detail-panel.open { transform: translateX(0); }
    #detail-overlay.open { display: block; }

    .panel-header {
      position: sticky;
      top: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1;
    }
    #detail-title {
      font-size: .95rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    #detail-close {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 30px; height: 30px;
      border-radius: 8px;
      cursor: pointer;
      font-size: .85rem;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
      flex-shrink: 0;
    }
    #detail-close:hover { color: var(--text); border-color: var(--border2); background: var(--surface3); }

    #detail-body { padding: 1rem 1.25rem 2rem; }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: .5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: .8rem;
      gap: .5rem;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-key   { color: var(--muted); flex-shrink: 0; }
    .detail-value { font-weight: 500; text-align: right; word-break: break-word; }

    .detail-section {
      font-size: .62rem;
      letter-spacing: .1em;
      color: var(--muted);
      text-transform: uppercase;
      font-family: "SF Mono", "Menlo", monospace;
      margin: 1.25rem 0 .5rem;
      padding-bottom: .3rem;
      border-bottom: 1px solid var(--border);
    }

    /* Progress bar */
    .metric-row { margin: .6rem 0; }
    .metric-label {
      font-size: .72rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }
    .metric-label strong { color: var(--text); }
    .progress-wrap { width: 100%; background: var(--surface3); border-radius: 99px; height: 5px; }
    .progress-fill { height: 5px; border-radius: 99px; background: var(--green); transition: width .5s cubic-bezier(.4,0,.2,1); }
    .progress-fill.warn { background: var(--yellow); }
    .progress-fill.low  { background: var(--red); }

    /* Log list */
    .log-list { display: flex; flex-direction: column; gap: 0; }
    .log-item {
      font-size: .73rem;
      padding: .38rem 0;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 3rem 4rem 1fr;
      gap: .5rem;
      align-items: center;
    }
    .log-item:last-child { border-bottom: none; }
    .log-date   { color: var(--muted); font-family: "SF Mono", "Menlo", monospace; font-size: .65rem; }
    .log-metric { color: var(--accent); text-transform: capitalize; }
    .log-value  { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Event list */
    .event-item {
      padding: .6rem 0;
      border-bottom: 1px solid var(--border);
    }
    .event-item:last-child { border-bottom: none; }
    .event-name { font-size: .8rem; font-weight: 600; margin-bottom: .2rem; }
    .event-time { font-size: .68rem; color: var(--muted); }
    .event-loc  { font-size: .67rem; color: var(--accent); margin-top: .1rem; }

    /* Email item */
    .email-item {
      padding: .55rem 0;
      border-bottom: 1px solid var(--border);
    }
    .email-item:last-child { border-bottom: none; }
    .email-subject { font-size: .78rem; font-weight: 500; margin-bottom: .15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .email-from    { font-size: .67rem; color: var(--muted); }

    /* Deal block in panel */
    .deal-block {
      padding: .65rem 0;
      border-bottom: 1px solid var(--border);
    }
    .deal-block:last-child { border-bottom: none; }
    .deal-header { font-size: .8rem; font-weight: 600; display: flex; align-items: center; gap: .4rem; margin-bottom: .2rem; }
    .deal-meta-line { font-size: .68rem; color: var(--muted); }

    /* ── Auto-refresh bar ── */
    #refresh-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--border);
      z-index: 99;
    }
    #refresh-progress {
      height: 100%;
      background: var(--accent);
      transition: width 1s linear;
      width: 100%;
    }
    #refresh-indicator {
      position: fixed;
      bottom: .5rem;
      right: .9rem;
      font-size: .62rem;
      color: var(--muted);
      font-family: "SF Mono", "Menlo", monospace;
      z-index: 99;
    }

    /* Loading shimmer */
    .shimmer {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: .8rem;
      margin: .4rem 0;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* Error state */
    .error-msg { font-size: .78rem; color: var(--muted); text-align: center; padding: 2rem 0; }

    @media (max-width: 540px) {
      .agent-grid { grid-template-columns: 1fr 1fr; gap: .5rem; }
      .card { padding: .8rem .9rem; }
    }
    @media (max-width: 360px) {
      .agent-grid { grid-template-columns: 1fr; }
      #detail-panel { width: 100vw; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1><span class="logo">⚡</span> Executive AI</h1>
    <div id="server-time">Connecting...</div>
  </div>
  <div class="header-right">
    <button id="refresh-btn" onclick="loadAll()">↻</button>
  </div>
</header>

<main>
  <div class="section-label">Agents</div>
  <div class="agent-grid" id="agent-grid">
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:55%"></div></div>
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:65%"></div></div>
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:50%"></div></div>
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:70%"></div></div>
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:60%"></div></div>
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:55%"></div></div>
  </div>
</main>

<!-- Detail panel -->
<div id="detail-overlay" onclick="closeDetail()"></div>
<div id="detail-panel">
  <div class="panel-header">
    <div id="detail-title"></div>
    <button id="detail-close" onclick="closeDetail()">✕</button>
  </div>
  <div id="detail-body"></div>
</div>

<!-- Auto-refresh bar -->
<div id="refresh-bar"><div id="refresh-progress"></div></div>
<div id="refresh-indicator">↻ <span id="countdown">30</span>s</div>

<script>
const AGENTS_ORDER = [
  "health","finance","market","calendar","email",
  "travel","followup","bonus","social","mortgage","infusion"
];
const REFRESH_SECS = 30;

let summaryData = null;
let countdown = REFRESH_SECS;
let countdownTimer = null;

// ── Fetch helpers ─────────────────────────────────────────────────────────────
async function apiFetch(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ── Load all ──────────────────────────────────────────────────────────────────
async function loadAll() {
  const btn = document.getElementById("refresh-btn");
  btn.classList.add("spinning");
  try {
    summaryData = await apiFetch("/api/summary");
    document.getElementById("server-time").textContent = summaryData.server_time || "";
    renderGrid(summaryData.agents);
    resetCountdown();
  } catch(e) {
    console.error("load failed:", e);
  } finally {
    btn.classList.remove("spinning");
  }
}

// ── Render cards ──────────────────────────────────────────────────────────────
function renderGrid(agents) {
  const grid = document.getElementById("agent-grid");
  grid.innerHTML = "";
  AGENTS_ORDER.forEach(key => {
    const a = agents[key];
    if (!a) return;
    grid.appendChild(buildCard(key, a));
  });
}

function buildCard(key, a) {
  const card = document.createElement("div");
  card.className = `card status-${a.status}`;
  card.onclick = () => openDetail(key, a);

  let extra = "";

  if (key === "travel" && a.deals && a.deals.length) {
    const items = a.deals.slice(0, 3).map(deal => {
      const icon = deal.priority === "steal" ? "🔥" : deal.priority === "alert" ? "🔔" : "✨";
      return `<div class="deal-item">
        <span>${icon}</span>
        <span class="deal-route">${deal.route || ""}</span>
        <span class="deal-price">${deal.price || ""}</span>
      </div>`;
    }).join("");
    extra = `<div class="card-extra"><div class="deal-list">${items}</div></div>`;
  }

  if (key === "health" && a.last_weight) {
    extra = `<div class="card-extra">
      <span class="card-badge">⚖️ ${a.last_weight} → ${a.weight_goal}</span>
    </div>`;
  }

  if (key === "followup" && a.overdue && a.overdue.length) {
    const f = a.overdue[0];
    extra = `<div class="card-extra">
      <span class="card-badge" style="color:var(--yellow);border-color:rgba(251,191,36,.3)">⚠️ ${f.contact || ""}: ${(f.context || "").slice(0, 30)}</span>
    </div>`;
  }

  if (key === "market") {
    const colorMap = { green: "var(--green)", yellow: "var(--yellow)", orange: "var(--orange)", gray: "var(--muted)" };
    const c = colorMap[a.status] || "var(--muted)";
    extra = `<div class="card-extra">
      <span class="card-badge" style="color:${c};border-color:${c}33">${a.summary}</span>
    </div>`;
  }

  if (key === "calendar" && a.next) {
    extra = `<div class="card-extra">
      <span class="card-badge" style="font-family:inherit;font-size:.7rem">📍 ${a.next}</span>
    </div>`;
  }

  card.innerHTML = `
    <div class="card-header">
      <div class="card-title">
        <span class="card-icon">${a.icon}</span>
        <span>${a.label}</span>
      </div>
      <div class="status-dot ${a.status}"></div>
    </div>
    <div class="card-summary">${a.summary}</div>
    ${extra}
  `;
  return card;
}

// ── Detail panel ──────────────────────────────────────────────────────────────
async function openDetail(key, agentData) {
  const panel   = document.getElementById("detail-panel");
  const overlay = document.getElementById("detail-overlay");
  const title   = document.getElementById("detail-title");
  const body    = document.getElementById("detail-body");

  title.innerHTML = `<span>${agentData.icon}</span> ${agentData.label}`;
  body.innerHTML  = shimmerBlock(3);
  panel.classList.add("open");
  overlay.classList.add("open");

  try {
    const renderers = {
      health:  async () => renderHealthDetail(await apiFetch("/api/health")),
      travel:  async () => renderTravelDetail(await apiFetch("/api/travel")),
      followup:async () => renderFollowupDetail(await apiFetch("/api/followups")),
      calendar:async () => renderCalendarDetail(await apiFetch("/api/calendar")),
      email:   async () => renderEmailDetail(await apiFetch("/api/email")),
      finance: async () => renderFinanceDetail(await apiFetch("/api/finance")),
      tasks:   async () => renderTasksDetail(await apiFetch("/api/tasks")),
    };
    const fn = renderers[key];
    body.innerHTML = fn ? await fn() : renderGenericDetail(agentData);
  } catch(e) {
    body.innerHTML = `<div class="error-msg">Could not load data<br><small>${e.message}</small></div>`;
  }
}

function closeDetail() {
  document.getElementById("detail-panel").classList.remove("open");
  document.getElementById("detail-overlay").classList.remove("open");
}

function shimmerBlock(n) {
  return Array(n).fill(0).map((_,i) =>
    `<div class="shimmer" style="width:${[100,70,85,55,90][i%5]}%;margin-bottom:.5rem"></div>`
  ).join("");
}

// ── Shared helpers ────────────────────────────────────────────────────────────
function row(key, value, style="") {
  return `<div class="detail-row">
    <span class="detail-key">${key}</span>
    <span class="detail-value" ${style ? `style="${style}"` : ""}>${value}</span>
  </div>`;
}

function section(label) {
  return `<div class="detail-section">${label}</div>`;
}

function progressRow(label, value, max, unit="", warnAt=0.5) {
  const pct = max ? Math.min(100, Math.round((value / max) * 100)) : 0;
  const cls = pct >= 75 ? "" : pct >= warnAt * 100 ? "warn" : "low";
  return `<div class="metric-row">
    <div class="metric-label">
      <span>${label}</span>
      <strong>${value}${unit} / ${max}${unit}</strong>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill ${cls}" style="width:${pct}%"></div>
    </div>
  </div>`;
}

// ── Detail renderers ──────────────────────────────────────────────────────────
function renderHealthDetail(d) {
  let html = "";
  if (d.last_weight) html += row("Last weight", `${d.last_weight.value} lbs — ${d.last_weight.date}`);
  html += row("Weight goal", `${d.targets?.weight || 165} lbs`);
  if (d.last_sleep) html += row("Last sleep", `${d.last_sleep.value}h — ${d.last_sleep.date}`);
  html += row("Sleep goal", `${d.targets?.sleep || 7.5}h/night`);
  html += row("Meals today", d.meals_today);
  html += progressRow("Workouts this week", d.workouts_week, d.workout_goal);
  if (d.targets) {
    html += section("Daily Targets");
    html += row("Protein goal", `${d.targets.protein}g / day`);
    html += row("Calorie goal", `${d.targets.calories} kcal / day`);
  }
  if (d.recent_logs && d.recent_logs.length) {
    html += section("Recent Logs");
    html += `<div class="log-list">`;
    d.recent_logs.slice(0, 20).forEach(l => {
      html += `<div class="log-item">
        <span class="log-date">${(l.date || "").slice(5,10)}</span>
        <span class="log-metric">${l.metric || ""}</span>
        <span class="log-value">${String(l.value || "").slice(0, 60)}</span>
      </div>`;
    });
    html += `</div>`;
  }
  return html;
}

function renderTravelDetail(d) {
  if (!d.live) {
    return `<div class="error-msg">No live data yet.<br><small>Flight tracker runs Mon/Wed/Fri 8AM ET</small></div>
      ${section("Repo")}
      ${row("GitHub", '<a href="https://github.com/jng-ai/flight-tracker" style="color:var(--accent)" target="_blank">jng-ai/flight-tracker ↗</a>')}`;
  }
  let html = "";
  html += row("Last scan", d.last_updated ? new Date(d.last_updated).toLocaleString("en-US", {month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}) : "—");
  html += row("🔥 Steals", d.steals || 0, d.steals ? "color:var(--yellow);font-weight:700" : "");
  html += row("🔔 Deals", d.alerts || 0);
  html += row("✨ Award space", d.awards || 0, "color:var(--purple)");

  const deals = d.deals || [];
  if (deals.length) {
    html += section("Top Deals");
    deals.forEach(deal => {
      const icon = deal.priority === "steal" ? "🔥" : deal.priority === "alert" ? "🔔" : "✨";
      const pctBadge = deal.pctUnder > 0
        ? `<span style="color:var(--green);font-size:.65rem;margin-left:.3rem">${deal.pctUnder}% under avg</span>` : "";
      html += `<div class="deal-block">
        <div class="deal-header">${icon} ${deal.route || ""} — <span style="color:var(--yellow)">${deal.price || ""}</span>${pctBadge}</div>
        <div class="deal-meta-line">${(deal.meta || "").slice(0, 80)}</div>
      </div>`;
    });
  }
  html += section("Repo");
  html += row("GitHub", '<a href="https://github.com/jng-ai/flight-tracker" style="color:var(--accent)" target="_blank">jng-ai/flight-tracker ↗</a>');
  return html;
}

function renderFollowupDetail(d) {
  const pending = d.pending || [];
  const overdue = d.overdue || [];
  const upcoming = d.upcoming || [];

  if (!pending.length) return `<div class="error-msg">No pending follow-ups ✅</div>`;

  let html = row("Total pending", pending.length) + row("Overdue", overdue.length, overdue.length ? "color:var(--yellow);font-weight:700" : "");

  if (overdue.length) {
    html += section("⚠️ Overdue");
    overdue.forEach(f => {
      html += `<div class="event-item">
        <div class="event-name">${f.contact || "?"}</div>
        <div class="event-time">Due ${f.due_date || "?"} · ${f.type || "follow-up"}</div>
        <div class="event-loc">${(f.context || "").slice(0, 70)}</div>
      </div>`;
    });
  }
  if (upcoming.length) {
    html += section("Upcoming");
    upcoming.slice(0, 6).forEach(f => {
      html += `<div class="event-item">
        <div class="event-name">${f.contact || "?"}</div>
        <div class="event-time">Due ${f.due_date || "?"} · ${f.type || "follow-up"}</div>
        <div class="event-loc">${(f.context || "").slice(0, 60)}</div>
      </div>`;
    });
  }
  return html;
}

function renderCalendarDetail(d) {
  if (!d.configured) return `<div class="error-msg">Google Calendar not connected.</div>`;
  const events = d.events || [];
  if (!events.length) return `<div class="error-msg">No events in the next 7 days.</div>`;

  let html = section("Next 7 Days");
  events.forEach(e => {
    const raw = e.start?.dateTime || e.start?.date || "";
    let label = raw;
    try {
      const dt = new Date(raw);
      label = dt.toLocaleDateString("en-US", {weekday:"short",month:"short",day:"numeric"})
             + (e.start?.dateTime ? " · " + dt.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}) : "");
    } catch {}
    html += `<div class="event-item">
      <div class="event-name">${e.summary || "Untitled"}</div>
      <div class="event-time">${label}</div>
      ${e.location ? `<div class="event-loc">📍 ${e.location.slice(0,50)}</div>` : ""}
    </div>`;
  });
  return html;
}

function renderEmailDetail(d) {
  if (!d.configured) return `<div class="error-msg">Gmail not connected.</div>`;
  const emails = d.unread || [];
  const count = d.count || emails.length;
  let html = row("Unread", `${count}${count >= 20 ? "+" : ""}`);
  if (!emails.length) return html;

  html += section("Recent Unread");
  emails.slice(0, 10).forEach(m => {
    html += `<div class="email-item">
      <div class="email-subject">${(m.subject || "(no subject)").slice(0, 55)}</div>
      <div class="email-from">${(m.from || "").slice(0, 45)}</div>
    </div>`;
  });
  return html;
}

function renderFinanceDetail(d) {
  let html = "";
  if (d.net_worth && d.net_worth !== "—") html += row("Net worth", d.net_worth);
  html += row("Profile updated", d.profile_updated || "—");
  html += row("Last bonus scan", d.last_bonus_scan || "—");

  const budget = d.recent_budget || [];
  if (budget.length) {
    html += section("Recent Budget Logs");
    [...budget].reverse().slice(0, 8).forEach(b => {
      html += `<div class="detail-row">
        <span class="detail-key">${b.category || "?"} · ${(b.date || "").slice(5,10)}</span>
        <span class="detail-value">$${b.amount || "?"} — ${(b.note || "").slice(0, 30)}</span>
      </div>`;
    });
  }
  return html;
}

function renderTasksDetail(d) {
  const open = d.open || [];
  if (!open.length) return `<div class="error-msg">No open tasks ✅</div>`;
  let html = row("Open tasks", open.length) + section("Open");
  open.slice(0, 10).forEach(t => {
    html += `<div class="event-item">
      <div class="event-name">${(t.title || t.text || "Task").slice(0, 60)}</div>
      ${t.due_date ? `<div class="event-time">Due ${t.due_date}</div>` : ""}
    </div>`;
  });
  return html;
}

function renderGenericDetail(a) {
  let html = row("Status", a.summary);
  if (a.last_scan) html += row("Last scan", a.last_scan);
  html += `<p style="margin-top:1.5rem;font-size:.75rem;color:var(--muted)">Interact with this agent via Telegram.</p>`;
  return html;
}

// ── Auto-refresh countdown ────────────────────────────────────────────────────
function resetCountdown() {
  countdown = REFRESH_SECS;
  document.getElementById("countdown").textContent = countdown;
  document.getElementById("refresh-progress").style.width = "100%";
}

function startCountdown() {
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdown = Math.max(0, countdown - 1);
    document.getElementById("countdown").textContent = countdown;
    const pct = (countdown / REFRESH_SECS * 100).toFixed(1);
    document.getElementById("refresh-progress").style.width = pct + "%";
    if (countdown === 0) loadAll();
  }, 1000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadAll();
startCountdown();
</script>
</body>
</html>
