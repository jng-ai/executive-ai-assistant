<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Executive AI Dashboard</title>
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#070e1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    :root {
      --bg:       #070e1a;
      --surface:  #0d1b2a;
      --surface2: #112236;
      --surface3: #172c43;
      --border:   #1e3a52;
      --border2:  #254e6e;
      --text:     #e2e8f0;
      --muted:    #6b8099;
      --accent:   #38bdf8;
      --green:    #4ade80;
      --yellow:   #fbbf24;
      --orange:   #fb923c;
      --red:      #f87171;
      --purple:   #a78bfa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      min-height: 100vh;
      padding-bottom: 4rem;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(180deg, #0a1525 0%, var(--surface) 100%);
      border-bottom: 1px solid var(--border);
      padding: .85rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: .95rem; font-weight: 700; display: flex; align-items: center; gap: .4rem; }
    header h1 .logo { color: var(--accent); }
    #server-time { font-size: .65rem; color: var(--muted); font-family: monospace; margin-top: .1rem; }
    #refresh-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: .35rem .65rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: .72rem;
      transition: all .15s;
    }
    #refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    #refresh-btn.loading { animation: spin .7s linear infinite; color: var(--accent); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Main ── */
    main { max-width: 960px; margin: 0 auto; padding: 1rem; }
    .section-label {
      font-size: .6rem;
      letter-spacing: .12em;
      color: var(--muted);
      font-family: monospace;
      text-transform: uppercase;
      margin: 0 0 .6rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .section-label::after { content: ""; flex: 1; height: 1px; background: var(--border); }

    /* ── Cards ── */
    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(268px, 1fr));
      gap: .65rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: .95rem 1.05rem;
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .1s, box-shadow .15s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .card.s-ok::before    { background: var(--green); }
    .card.s-warn::before  { background: var(--yellow); }
    .card.s-gray::before  { background: var(--border2); }
    .card.s-green::before { background: var(--green); }
    .card.s-yellow::before { background: var(--yellow); }
    .card.s-orange::before { background: var(--orange); }
    .card:hover { border-color: var(--border2); background: var(--surface2); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,.35); }

    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; }
    .card-title  { display: flex; align-items: center; gap: .4rem; font-size: .82rem; font-weight: 600; }
    .card-icon   { font-size: 1rem; line-height: 1; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot.ok, .dot.green { background: var(--green); box-shadow: 0 0 6px rgba(74,222,128,.4); }
    .dot.warn, .dot.yellow { background: var(--yellow); box-shadow: 0 0 8px rgba(251,191,36,.5); animation: pulse 2s infinite; }
    .dot.orange { background: var(--orange); }
    .dot.gray   { background: var(--muted); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .card-summary { font-size: .76rem; color: var(--muted); line-height: 1.45; }
    .card-extra   { margin-top: .42rem; }
    .badge {
      display: inline-flex; align-items: center; gap: .25rem;
      font-size: .67rem;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .18rem .45rem;
      color: var(--accent);
      font-family: monospace;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .deal-list { display: flex; flex-direction: column; gap: .18rem; margin-top: .35rem; }
    .deal-row  { font-size: .7rem; display: flex; gap: .3rem; align-items: center; }
    .deal-route { font-weight: 600; }
    .deal-price { color: var(--yellow); font-family: monospace; }

    /* ── Detail panel ── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 200;
      backdrop-filter: blur(3px);
    }
    #panel {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: min(440px, 100vw);
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      z-index: 201;
      transform: translateX(100%);
      transition: transform .2s cubic-bezier(.4,0,.2,1);
    }
    #panel.open { transform: translateX(0); }
    #overlay.open { display: block; }
    .ph {
      position: sticky; top: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: .9rem 1.1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1;
    }
    #ptitle { font-size: .95rem; font-weight: 700; display: flex; align-items: center; gap: .45rem; }
    #pclose {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 29px; height: 29px;
      border-radius: 8px;
      cursor: pointer;
      font-size: .85rem;
      display: flex; align-items: center; justify-content: center;
    }
    #pclose:hover { color: var(--text); border-color: var(--border2); }
    #pbody { padding: 1rem 1.1rem 2rem; }

    /* Detail content atoms */
    .drow {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: .48rem 0;
      border-bottom: 1px solid var(--border);
      font-size: .8rem;
      gap: .5rem;
    }
    .drow:last-child { border-bottom: none; }
    .dk { color: var(--muted); flex-shrink: 0; }
    .dv { font-weight: 500; text-align: right; word-break: break-word; }
    .dsec {
      font-size: .6rem;
      letter-spacing: .1em;
      color: var(--muted);
      text-transform: uppercase;
      font-family: monospace;
      margin: 1.2rem 0 .45rem;
      padding-bottom: .3rem;
      border-bottom: 1px solid var(--border);
    }

    /* Progress */
    .prow { margin: .55rem 0; }
    .plabel { font-size: .72rem; color: var(--muted); display: flex; justify-content: space-between; margin-bottom: 4px; }
    .plabel strong { color: var(--text); }
    .pbar { height: 5px; background: var(--surface3); border-radius: 99px; }
    .pfill { height: 5px; border-radius: 99px; background: var(--green); transition: width .5s; }
    .pfill.warn { background: var(--yellow); }
    .pfill.low  { background: var(--red); }

    /* Log list */
    .log-item {
      font-size: .73rem;
      padding: .36rem 0;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 3.2rem 4.5rem 1fr;
      gap: .45rem;
      align-items: center;
    }
    .log-item:last-child { border-bottom: none; }
    .ld { color: var(--muted); font-family: monospace; font-size: .65rem; }
    .lm { color: var(--accent); text-transform: capitalize; }
    .lv { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Events */
    .ev-item { padding: .55rem 0; border-bottom: 1px solid var(--border); }
    .ev-item:last-child { border-bottom: none; }
    .ev-name { font-size: .8rem; font-weight: 600; margin-bottom: .18rem; }
    .ev-time { font-size: .68rem; color: var(--muted); }
    .ev-loc  { font-size: .67rem; color: var(--accent); margin-top: .1rem; }
    .ev-link { font-size: .67rem; }
    .ev-link a { color: var(--muted); text-decoration: none; }
    .ev-link a:hover { color: var(--accent); }
    .conflict { background: rgba(251,191,36,.08); border-left: 2px solid var(--yellow); padding-left: .4rem; border-radius: 0 6px 6px 0; }

    /* Email */
    .em-item { padding: .5rem 0; border-bottom: 1px solid var(--border); display: flex; gap: .5rem; align-items: flex-start; }
    .em-item:last-child { border-bottom: none; }
    .em-urg  { font-size: .75rem; flex-shrink: 0; margin-top: .05rem; }
    .em-body { overflow: hidden; }
    .em-subj { font-size: .78rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .em-from { font-size: .66rem; color: var(--muted); }
    .em-snip { font-size: .66rem; color: var(--muted); margin-top: .1rem; display: none; }
    .em-item.expanded .em-snip { display: block; white-space: normal; }

    /* Deal block */
    .deal-block { padding: .6rem 0; border-bottom: 1px solid var(--border); }
    .deal-block:last-child { border-bottom: none; }
    .deal-hdr  { font-size: .8rem; font-weight: 600; display: flex; align-items: center; gap: .35rem; margin-bottom: .18rem; flex-wrap: wrap; }
    .deal-meta { font-size: .67rem; color: var(--muted); }

    /* Stock grid */
    .stock-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: .5rem; margin-top: .5rem; }
    .stock-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .55rem .65rem;
    }
    .stock-ticker { font-size: .78rem; font-weight: 700; font-family: monospace; }
    .stock-price  { font-size: .9rem; font-weight: 600; margin: .1rem 0; }
    .stock-change { font-size: .72rem; font-weight: 600; }
    .stock-change.up   { color: var(--green); }
    .stock-change.down { color: var(--red); }
    .stock-range  { margin-top: .3rem; }
    .range-bar    { height: 3px; background: var(--border2); border-radius: 99px; position: relative; }
    .range-dot    { position: absolute; top: -1.5px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); transform: translateX(-50%); }
    .range-labels { display: flex; justify-content: space-between; font-size: .58rem; color: var(--muted); margin-top: 2px; }

    /* Offer / listing cards */
    .offer-item { padding: .55rem 0; border-bottom: 1px solid var(--border); }
    .offer-item:last-child { border-bottom: none; }
    .offer-name { font-size: .78rem; font-weight: 600; }
    .offer-meta { font-size: .67rem; color: var(--muted); margin-top: .12rem; }

    /* Action buttons */
    .action-btn {
      display: flex; align-items: center; justify-content: center; gap: .4rem;
      width: 100%;
      margin-top: 1.25rem;
      padding: .6rem;
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: 10px;
      color: var(--accent);
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .action-btn:hover:not(:disabled) { background: var(--surface2); border-color: var(--accent); }
    .action-btn:disabled { opacity: .5; cursor: not-allowed; }
    .action-btn.running { animation: pulse 1s infinite; }
    .action-result {
      margin-top: .6rem;
      font-size: .72rem;
      padding: .45rem .65rem;
      border-radius: 8px;
      display: none;
    }
    .action-result.ok   { background: rgba(74,222,128,.1); color: var(--green); display: block; }
    .action-result.err  { background: rgba(248,113,113,.1); color: var(--red); display: block; }

    /* Workout dots */
    .workout-grid { display: flex; gap: .35rem; margin-top: .35rem; }
    .wd { width: 22px; height: 22px; border-radius: 6px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: .65rem; }
    .wd.done  { background: rgba(74,222,128,.15); border-color: var(--green); color: var(--green); }
    .wd.miss  { background: var(--surface3); color: var(--muted); }

    /* Bottom refresh bar */
    #rbar { position: fixed; bottom: 0; left: 0; right: 0; height: 2px; background: var(--border); z-index: 99; }
    #rprog { height: 100%; background: var(--accent); transition: width 1s linear; }
    #rind  { position: fixed; bottom: .45rem; right: .9rem; font-size: .6rem; color: var(--muted); font-family: monospace; z-index: 99; }

    /* Shimmer */
    .shimmer {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: .8rem;
      margin: .4rem 0;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .empty-msg { font-size: .78rem; color: var(--muted); text-align: center; padding: 2rem 0; }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    @media (max-width: 540px) {
      .agent-grid { grid-template-columns: 1fr 1fr; gap: .5rem; }
      .card { padding: .8rem .85rem; }
      .stock-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 360px) {
      .agent-grid { grid-template-columns: 1fr; }
      #panel { width: 100vw; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1><span class="logo">⚡</span> Executive AI</h1>
    <div id="server-time">Connecting…</div>
  </div>
  <button id="refresh-btn" onclick="loadAll()">↻</button>
</header>

<main>
  <div class="section-label">Agents</div>
  <div class="agent-grid" id="agent-grid">
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:55%"></div></div>
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:65%"></div></div>
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:50%"></div></div>
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:70%"></div></div>
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:60%"></div></div>
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:55%"></div></div>
  </div>
</main>

<div id="overlay" onclick="closePanel()"></div>
<div id="panel">
  <div class="ph">
    <div id="ptitle"></div>
    <button id="pclose" onclick="closePanel()">✕</button>
  </div>
  <div id="pbody"></div>
</div>

<div id="rbar"><div id="rprog"></div></div>
<div id="rind">↻ <span id="rcount">30</span>s</div>

<script>
const ORDER = [
  "health","finance","market","calendar","email",
  "travel","followup","bonus","social","mortgage","infusion","investment"
];
const REFRESH = 30;
let summary = null;
let countdown = REFRESH;
let timer = null;

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function loadAll() {
  const btn = document.getElementById("refresh-btn");
  btn.classList.add("loading");
  try {
    summary = await api("/api/summary");
    document.getElementById("server-time").textContent = summary.server_time || "";
    renderGrid(summary.agents);
    resetCountdown();
  } catch(e) { console.error(e); }
  finally { btn.classList.remove("loading"); }
}

// ── Cards ─────────────────────────────────────────────────────────────────────
function renderGrid(agents) {
  const grid = document.getElementById("agent-grid");
  grid.innerHTML = "";
  ORDER.forEach(key => {
    const a = agents[key];
    if (!a) return;
    grid.appendChild(buildCard(key, a));
  });
}

function buildCard(key, a) {
  const card = document.createElement("div");
  card.className = `card s-${a.status}`;
  card.onclick = () => openPanel(key, a);

  let extra = "";
  if (key === "travel" && a.deals?.length) {
    extra = `<div class="card-extra"><div class="deal-list">${a.deals.slice(0,3).map(d=>
      `<div class="deal-row"><span>${d.priority==="steal"?"🔥":d.priority==="alert"?"🔔":"✨"}</span><span class="deal-route">${d.route||""}</span><span class="deal-price">${d.price||""}</span></div>`
    ).join("")}</div></div>`;
  }
  if (key === "health" && a.last_weight) {
    extra = `<div class="card-extra"><span class="badge">⚖️ ${a.last_weight} → ${a.weight_goal}</span></div>`;
  }
  if (key === "followup" && a.overdue?.length) {
    extra = `<div class="card-extra"><span class="badge" style="color:var(--yellow);border-color:rgba(251,191,36,.3)">⚠️ ${a.overdue[0].contact}: ${(a.overdue[0].context||"").slice(0,28)}</span></div>`;
  }
  if (key === "market") {
    const c={green:"var(--green)",yellow:"var(--yellow)",orange:"var(--orange)",gray:"var(--muted)"}[a.status]||"var(--muted)";
    extra = `<div class="card-extra"><span class="badge" style="color:${c};border-color:${c}44">${a.summary}</span></div>`;
  }
  if (key === "calendar" && a.next) {
    extra = `<div class="card-extra"><span class="badge" style="font-family:inherit">📍 ${a.next}</span></div>`;
  }
  if (key === "investment") {
    extra = `<div class="card-extra"><span class="badge">📊 tap for prices</span></div>`;
  }

  card.innerHTML = `
    <div class="card-header">
      <div class="card-title"><span class="card-icon">${a.icon}</span><span>${a.label}</span></div>
      <div class="dot ${a.status}"></div>
    </div>
    <div class="card-summary">${a.summary}</div>
    ${extra}`;
  return card;
}

// ── Panel ──────────────────────────────────────────────────────────────────────
async function openPanel(key, a) {
  document.getElementById("ptitle").innerHTML = `<span>${a.icon}</span> ${a.label}`;
  document.getElementById("pbody").innerHTML = shimmer(3);
  document.getElementById("panel").classList.add("open");
  document.getElementById("overlay").classList.add("open");
  try {
    const map = {
      health:     () => api("/api/health").then(renderHealth),
      finance:    () => api("/api/finance").then(renderFinance),
      market:     () => api("/api/market").then(renderMarket),
      calendar:   () => api("/api/calendar").then(renderCalendar),
      email:      () => api("/api/email").then(renderEmail),
      travel:     () => api("/api/travel").then(renderTravel),
      followup:   () => api("/api/followups").then(renderFollowup),
      bonus:      () => api("/api/bonus").then(renderBonus),
      social:     () => api("/api/social").then(renderSocial),
      mortgage:   () => api("/api/mortgage").then(renderMortgage),
      infusion:   () => renderInfusion(a),
      investment: () => api("/api/investment").then(renderInvestment),
      tasks:      () => api("/api/tasks").then(renderTasks),
    };
    const fn = map[key];
    document.getElementById("pbody").innerHTML = fn ? await fn() : renderGeneric(a);
  } catch(e) {
    document.getElementById("pbody").innerHTML = `<div class="empty-msg">Could not load data<br><small>${e.message}</small></div>`;
  }
}

function closePanel() {
  document.getElementById("panel").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}

function shimmer(n) {
  return Array(n).fill(0).map((_,i)=>`<div class="shimmer" style="width:${[100,70,85,55,90][i%5]}%;margin-bottom:.5rem"></div>`).join("");
}

// ── Shared atoms ──────────────────────────────────────────────────────────────
const row = (k,v,s="") => `<div class="drow"><span class="dk">${k}</span><span class="dv"${s?` style="${s}"`:""}>${v}</span></div>`;
const sec = l => `<div class="dsec">${l}</div>`;
const pbar = (label, val, max, unit="") => {
  const pct = max ? Math.min(100, Math.round(val/max*100)) : 0;
  const cls = pct>=75?"":"warn";
  return `<div class="prow"><div class="plabel"><span>${label}</span><strong>${val}${unit} / ${max}${unit}</strong></div><div class="pbar"><div class="pfill ${cls}" style="width:${pct}%"></div></div></div>`;
};
const actionBtn = (label, action, icon="🔄") =>
  `<button class="action-btn" onclick="runAction('${action}',this)">${icon} ${label}</button><div class="action-result" id="res-${action}"></div>`;

// ── SVG sparklines ─────────────────────────────────────────────────────────────
function sparkline(values, {width=180, height=36, color="var(--green)", fill=true}={}) {
  const nums = values.map(v => parseFloat(v)).filter(v => !isNaN(v));
  if (nums.length < 2) return `<svg width="${width}" height="${height}"></svg>`;
  const min = Math.min(...nums), max = Math.max(...nums);
  const range = max - min || 1;
  const pts = nums.map((v, i) => {
    const x = (i / (nums.length-1)) * width;
    const y = height - ((v - min) / range) * (height - 4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  const fillPath = fill ? `<polygon points="0,${height} ${pts} ${width},${height}" fill="${color}" opacity="0.12"/>` : "";
  return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" style="overflow:visible">
    ${fillPath}
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function barChart(values, {width=180, height=28, color="var(--accent)"}={}) {
  const nums = values.map(v => parseFloat(v)).filter(v => !isNaN(v));
  if (!nums.length) return "";
  const max = Math.max(...nums, 0.1);
  const bw  = Math.floor(width / nums.length) - 2;
  const bars = nums.map((v, i) => {
    const h = Math.max(2, Math.round((v / max) * height));
    const x = i * (bw + 2);
    const y = height - h;
    return `<rect x="${x}" y="${y}" width="${bw}" height="${h}" rx="2" fill="${color}" opacity="0.75"/>`;
  }).join("");
  return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">${bars}</svg>`;
}

function renderCalendar(d) {
  if (!d.configured) return `<div class="empty-msg">Google Calendar not connected.</div>`;
  const events = d.events||[];
  if (!events.length) return `<div class="empty-msg">No events in the next 7 days.</div>`;

  h_top = "";
  if (d.today_count || d.tomorrow_count) {
    h_top += row("Today", d.today_count||0);
    h_top += row("Tomorrow", d.tomorrow_count||0);
  }

  // Group by date
  const groups = {};
  events.forEach(e => {
    const dt = e.start?.dateTime || e.start?.date || "";
    const day = dt.slice(0,10);
    if (!groups[day]) groups[day] = [];
    groups[day].push(e);
  });

  // Detect overlaps per day
  let html = h_top;
  const today = new Date().toISOString().slice(0,10);
  const tom   = new Date(Date.now()+86400000).toISOString().slice(0,10);

  Object.keys(groups).sort().forEach(day => {
    const label = day===today?"Today":day===tom?"Tomorrow":new Date(day+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
    html += sec(label);
    const evs = groups[day];
    evs.forEach((e, i) => {
      const startRaw = e.start?.dateTime||e.start?.date||"";
      const endRaw   = e.end?.dateTime||e.end?.date||"";
      let timeStr = "";
      if (e.start?.dateTime) {
        try {
          const s = new Date(startRaw), en = new Date(endRaw);
          timeStr = s.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})
                  + " – " + en.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
        } catch {}
      } else { timeStr = "All day"; }

      // Conflict check: overlaps next event
      let conflict = false;
      if (e.start?.dateTime && evs[i+1]?.start?.dateTime) {
        conflict = new Date(endRaw) > new Date(evs[i+1].start.dateTime);
      }

      html += `<div class="ev-item ${conflict?"conflict":""}">
        <div class="ev-name">${e.summary||"Untitled"}${conflict?" ⚠️":""}</div>
        <div class="ev-time">${timeStr}</div>
        ${e.location?`<div class="ev-loc">📍 ${e.location.slice(0,55)}</div>`:""}
        ${e.html_link?`<div class="ev-link"><a href="${e.html_link}" target="_blank">Open in Calendar ↗</a></div>`:""}
      </div>`;
    });
  });
  return html;
}

// ── Action runner ─────────────────────────────────────────────────────────────
async function runAction(action, btn) {
  btn.disabled = true;
  btn.classList.add("running");
  btn.textContent = "Running…";
  const resEl = document.getElementById(`res-${action}`);
  if (resEl) { resEl.className = "action-result"; resEl.textContent = ""; }
  try {
    const r = await fetch(`/api/action/${action}`, { method: "POST" });
    const d = await r.json();
    if (resEl) {
      resEl.className = `action-result ${d.success?"ok":"err"}`;
      resEl.textContent = d.success ? `✓ ${d.result||"Done"} (${d.duration_ms}ms)` : `✗ ${d.error}`;
    }
  } catch(e) {
    if (resEl) { resEl.className = "action-result err"; resEl.textContent = `✗ ${e.message}`; }
  } finally {
    btn.disabled = false;
    btn.classList.remove("running");
    btn.innerHTML = `🔄 ${btn.dataset.label||action.replace(/_/g," ")}`;
  }
}

// ── Countdown ──────────────────────────────────────────────────────────────────
function resetCountdown() {
  countdown = REFRESH;
  document.getElementById("rcount").textContent = countdown;
  document.getElementById("rprog").style.width  = "100%";
}
function startCountdown() {
  if (timer) clearInterval(timer);
  timer = setInterval(() => {
    countdown = Math.max(0, countdown - 1);
    document.getElementById("rcount").textContent = countdown;
    document.getElementById("rprog").style.width  = (countdown/REFRESH*100).toFixed(1)+"%";
    if (countdown === 0) loadAll();
  }, 1000);
}

loadAll();
startCountdown();
