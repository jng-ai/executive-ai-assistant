<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Executive AI Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#070e1a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}

/* Header */
header{background:#0d1b2a;border-bottom:1px solid #1e3a52;padding:.85rem 1.2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
header h1{font-size:.95rem;font-weight:700;color:#e2e8f0}
header h1 span{color:#38bdf8}
#server-time{font-size:.65rem;color:#6b8099;font-family:monospace;margin-top:.1rem}
#refresh-btn{background:#112236;border:1px solid #1e3a52;color:#6b8099;padding:.35rem .7rem;border-radius:8px;cursor:pointer;font-size:.75rem;transition:.15s}
#refresh-btn:hover{color:#38bdf8;border-color:#38bdf8}

/* Grid */
main{max-width:960px;margin:0 auto;padding:1rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.7rem;margin-top:.5rem}
.grid-label{font-size:.6rem;letter-spacing:.1em;color:#6b8099;font-family:monospace;text-transform:uppercase;padding-bottom:.4rem;border-bottom:1px solid #1e3a52;margin-bottom:.2rem}

/* Cards */
.card{background:#0d1b2a;border:1px solid #1e3a52;border-radius:12px;padding:.9rem 1rem;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.card:hover{background:#112236;border-color:#254e6e;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.4)}
.card-top-bar{position:absolute;top:0;left:0;right:0;height:2.5px}
.bar-ok{background:#4ade80} .bar-warn{background:#fbbf24} .bar-gray{background:#1e3a52} .bar-green{background:#4ade80} .bar-yellow{background:#fbbf24} .bar-orange{background:#fb923c}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.45rem}
.card-name{display:flex;align-items:center;gap:.4rem;font-size:.82rem;font-weight:600}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-ok,.dot-green{background:#4ade80;box-shadow:0 0 5px rgba(74,222,128,.4)}
.dot-warn,.dot-yellow{background:#fbbf24;box-shadow:0 0 6px rgba(251,191,36,.4);animation:pulse 2s infinite}
.dot-orange{background:#fb923c}
.dot-gray{background:#6b8099}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.card-summary{font-size:.76rem;color:#6b8099;line-height:1.45}
.card-extra{margin-top:.4rem}
.chip{display:inline-block;font-size:.67rem;background:#172c43;border:1px solid #1e3a52;border-radius:5px;padding:.15rem .4rem;color:#38bdf8;font-family:monospace;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Panel */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;backdrop-filter:blur(2px)}
#panel{position:fixed;right:0;top:0;bottom:0;width:min(460px,100vw);background:#0d1b2a;border-left:1px solid #1e3a52;z-index:101;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
#panel.open{transform:translateX(0)}
#overlay.open{display:block}
.panel-hdr{background:#0d1b2a;border-bottom:1px solid #1e3a52;padding:.9rem 1.1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#panel-title{font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:.45rem}
#panel-close{background:#112236;border:1px solid #1e3a52;color:#6b8099;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center}
#panel-close:hover{color:#e2e8f0;border-color:#254e6e}
#panel-body{padding:1rem 1.1rem;overflow-y:auto;flex:1}

/* Panel content atoms */
.section{font-size:.62rem;letter-spacing:.1em;color:#6b8099;text-transform:uppercase;font-family:monospace;margin:1.1rem 0 .4rem;padding-bottom:.3rem;border-bottom:1px solid #1e3a52}
.kv{display:flex;justify-content:space-between;align-items:baseline;padding:.45rem 0;border-bottom:1px solid #1e3a52;font-size:.8rem;gap:.5rem}
.kv:last-child{border-bottom:none}
.kv .k{color:#6b8099;flex-shrink:0}
.kv .v{font-weight:500;text-align:right;word-break:break-word}
.pbar-wrap{margin:.5rem 0}
.pbar-label{font-size:.72rem;color:#6b8099;display:flex;justify-content:space-between;margin-bottom:4px}
.pbar-label strong{color:#e2e8f0}
.pbar-bg{height:5px;background:#172c43;border-radius:99px}
.pbar-fill{height:5px;border-radius:99px;background:#4ade80;transition:width .5s}
.pbar-fill.warn{background:#fbbf24}
.ev{padding:.5rem 0;border-bottom:1px solid #1e3a52}
.ev:last-child{border-bottom:none}
.ev-name{font-size:.8rem;font-weight:600;margin-bottom:.18rem}
.ev-time{font-size:.68rem;color:#6b8099}
.ev-loc{font-size:.66rem;color:#38bdf8;margin-top:.08rem}
.log-row{font-size:.72rem;padding:.32rem 0;border-bottom:1px solid #1e3a52;display:grid;grid-template-columns:3rem 4.5rem 1fr;gap:.4rem}
.log-row:last-child{border-bottom:none}
.log-d{color:#6b8099;font-family:monospace;font-size:.64rem}
.log-m{color:#38bdf8;text-transform:capitalize}
.log-v{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stock-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin-top:.4rem}
.stock{background:#112236;border:1px solid #1e3a52;border-radius:9px;padding:.5rem .6rem}
.stock-t{font-size:.75rem;font-weight:700;font-family:monospace;color:#6b8099}
.stock-p{font-size:.9rem;font-weight:700;margin:.05rem 0}
.stock-c{font-size:.72rem;font-weight:600}
.up{color:#4ade80} .dn{color:#f87171}
.range-bar{height:3px;background:#1e3a52;border-radius:99px;position:relative;margin-top:.3rem}
.range-dot{position:absolute;top:-1.5px;width:6px;height:6px;border-radius:50%;background:#38bdf8;transform:translateX(-50%)}
.range-lbl{display:flex;justify-content:space-between;font-size:.58rem;color:#6b8099;margin-top:2px}
.email-row{padding:.45rem 0;border-bottom:1px solid #1e3a52;display:flex;gap:.45rem;align-items:flex-start}
.email-row:last-child{border-bottom:none}
.urg{font-size:.8rem;flex-shrink:0;margin-top:.05rem}
.email-subj{font-size:.77rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.email-from{font-size:.65rem;color:#6b8099}

/* Agent response */
.agent-response{background:#112236;border:1px solid #1e3a52;border-radius:8px;padding:.8rem 1rem;margin-top:.5rem;font-size:.78rem;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.ask-btn{width:100%;margin-top:1rem;padding:.6rem;background:#112236;border:1px solid #254e6e;border-radius:9px;color:#38bdf8;font-size:.78rem;font-weight:600;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:.4rem}
.ask-btn:hover:not(:disabled){background:#172c43;border-color:#38bdf8}
.ask-btn:disabled{opacity:.5;cursor:not-allowed}
.ask-status{font-size:.68rem;color:#6b8099;text-align:center;margin-top:.4rem}

/* Shimmer */
.shimmer{height:.8rem;border-radius:5px;margin:.4rem 0;background:linear-gradient(90deg,#0d1b2a 25%,#112236 50%,#0d1b2a 75%);background-size:200%;animation:sh 1.4s infinite}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Empty */
.empty{text-align:center;padding:2.5rem 1rem;color:#6b8099;font-size:.8rem}

/* Bottom progress */
#prog-bar{position:fixed;bottom:0;left:0;right:0;height:2px;background:#1e3a52}
#prog-fill{height:100%;background:#38bdf8;transition:width 1s linear}
#prog-label{position:fixed;bottom:.4rem;right:.9rem;font-size:.6rem;color:#6b8099;font-family:monospace}

a{color:#38bdf8;text-decoration:none}
a:hover{text-decoration:underline}

@media(max-width:540px){.grid{grid-template-columns:1fr 1fr;gap:.45rem}.stock-grid{grid-template-columns:1fr}}
@media(max-width:360px){.grid{grid-template-columns:1fr}#panel{width:100vw}}
</style>
</head>
<body>

<header>
  <div>
    <h1><span>⚡</span> Executive AI</h1>
    <div id="server-time">Loading…</div>
  </div>
  <button id="refresh-btn" onclick="loadSummary()">↻ Refresh</button>
</header>

<main>
  <div class="grid-label">Agents</div>
  <div class="grid" id="grid">
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:60%"></div></div>
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:60%"></div></div>
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:60%"></div></div>
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:60%"></div></div>
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:60%"></div></div>
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:60%"></div></div>
  </div>
</main>

<div id="overlay" onclick="closePanel()"></div>
<div id="panel">
  <div class="panel-hdr">
    <div id="panel-title">Agent</div>
    <button id="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div id="panel-body"><div class="empty">Loading…</div></div>
</div>

<div id="prog-bar"><div id="prog-fill" style="width:100%"></div></div>
<div id="prog-label">↻ <span id="prog-count">30</span>s</div>

<script>
const AGENT_ORDER = [
  "health","finance","market","calendar","email",
  "travel","followup","bonus","social","mortgage","infusion","investment"
];
const REFRESH_SEC = 30;
let countdown = REFRESH_SEC;
let timer = null;
let currentAgent = null;

// ── API helpers ───────────────────────────────────────────────────────────────
async function get(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status + ' on ' + url);
  return r.json();
}

// ── Load summary → render cards ───────────────────────────────────────────────
async function loadSummary() {
  document.getElementById('refresh-btn').textContent = '↻ …';
  try {
    const d = await get('/api/summary');
    document.getElementById('server-time').textContent = d.server_time || '';
    renderCards(d.agents);
    resetCountdown();
  } catch(e) {
    document.getElementById('server-time').textContent = 'Error: ' + e.message;
  }
  document.getElementById('refresh-btn').textContent = '↻ Refresh';
}

function renderCards(agents) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  AGENT_ORDER.forEach(function(key) {
    const a = agents[key];
    if (!a) return;
    const card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('data-key', key);

    const status = a.status || 'gray';
    const dotClass = 'dot-' + status;

    let extra = '';
    if (key === 'health' && a.last_weight) {
      extra = '<div class="card-extra"><span class="chip">⚖️ ' + a.last_weight + ' → ' + a.weight_goal + '</span></div>';
    } else if (key === 'market') {
      const c = {green:'#4ade80',yellow:'#fbbf24',orange:'#fb923c',gray:'#6b8099'}[status] || '#6b8099';
      extra = '<div class="card-extra"><span class="chip" style="color:' + c + '">' + a.summary + '</span></div>';
    } else if (key === 'calendar' && a.next) {
      extra = '<div class="card-extra"><span class="chip">📍 ' + esc(a.next) + '</span></div>';
    } else if (key === 'followup' && a.overdue && a.overdue.length) {
      extra = '<div class="card-extra"><span class="chip" style="color:#fbbf24">⚠️ ' + esc(a.overdue[0].contact || '') + '</span></div>';
    } else if (key === 'travel' && a.deals && a.deals.length) {
      extra = '<div class="card-extra">' + a.deals.slice(0,2).map(function(d) {
        return '<div style="font-size:.7rem;margin-top:.2rem">' +
          (d.priority==='steal'?'🔥':d.priority==='alert'?'🔔':'✨') +
          ' <b>' + esc(d.route||'') + '</b> <span style="color:#fbbf24">' + esc(d.price||'') + '</span></div>';
      }).join('') + '</div>';
    }

    card.innerHTML =
      '<div class="card-top-bar bar-' + status + '"></div>' +
      '<div class="card-head">' +
        '<div class="card-name"><span>' + a.icon + '</span><span>' + esc(a.label) + '</span></div>' +
        '<div class="dot ' + dotClass + '"></div>' +
      '</div>' +
      '<div class="card-summary">' + esc(a.summary) + '</div>' +
      extra;

    card.addEventListener('click', function() { openPanel(key, a); });
    grid.appendChild(card);
  });
}

// ── Panel ──────────────────────────────────────────────────────────────────────
function openPanel(key, agentCard) {
  currentAgent = key;
  document.getElementById('panel-title').innerHTML = agentCard.icon + ' ' + esc(agentCard.label);
  document.getElementById('panel-body').innerHTML = shimmer(4);
  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  loadPanelData(key);
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  currentAgent = null;
}

async function loadPanelData(key) {
  const body = document.getElementById('panel-body');
  try {
    let html = '';
    if (key === 'health')      html = await renderHealth();
    else if (key === 'finance') html = await renderFinance();
    else if (key === 'market')  html = await renderMarket();
    else if (key === 'calendar')html = await renderCalendar();
    else if (key === 'email')   html = await renderEmail();
    else if (key === 'travel')  html = await renderTravel();
    else if (key === 'followup')html = await renderFollowup();
    else if (key === 'bonus')   html = await renderBonus();
    else if (key === 'social')  html = await renderSocial();
    else if (key === 'mortgage')html = await renderMortgage();
    else if (key === 'investment') html = await renderInvestment();
    else html = '<div class="empty">Use Telegram to interact with this agent.</div>';

    // Every panel gets an "Ask Agent" button at the bottom
    html += askBtn(key);
    body.innerHTML = html;
  } catch(e) {
    body.innerHTML = '<div class="empty">⚠️ ' + esc(e.message) + '</div>' + askBtn(key);
  }
}

function askBtn(key) {
  return '<button class="ask-btn" id="ask-btn-' + key + '" onclick="askAgent(\'' + key + '\')">' +
    '🤖 Ask Agent for Fresh Insights</button>' +
    '<div class="ask-status" id="ask-status-' + key + '"></div>' +
    '<div id="ask-response-' + key + '" style="display:none"></div>';
}

async function askAgent(key) {
  const btn = document.getElementById('ask-btn-' + key);
  const statusEl = document.getElementById('ask-status-' + key);
  const respEl   = document.getElementById('ask-response-' + key);
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = '⏳ Asking agent…';
  statusEl.textContent = 'Running LLM analysis, this takes 5-15s…';
  respEl.style.display = 'none';
  try {
    const d = await get('/api/agent/' + key);
    statusEl.textContent = '';
    respEl.style.display = 'block';
    respEl.innerHTML = '<div class="agent-response">' + esc(d.response || '(no response)') + '</div>';
    btn.textContent = '🔄 Refresh Insights';
  } catch(e) {
    statusEl.textContent = '✗ ' + e.message;
    btn.textContent = '🤖 Ask Agent for Fresh Insights';
  }
  btn.disabled = false;
}

// ── Panel renderers ───────────────────────────────────────────────────────────
async function renderHealth() {
  const d = await get('/api/health');
  let h = '';

  h += kv('Last weight', d.last_weight ? d.last_weight.value + ' lbs — ' + d.last_weight.date : '—');
  h += kv('Weight goal', '165 lbs');
  h += kv('Last sleep',  d.last_sleep  ? d.last_sleep.value  + 'h — '  + d.last_sleep.date  : 'No data');
  h += kv('Meals today', d.meals_today || 0);
  h += progressBar('Workouts this week', d.workouts_week || 0, d.workout_goal || 4);

  if (d.workout_week_grid && d.workout_week_grid.length) {
    h += sec('This Week');
    const days = ['Su','Mo','Tu','We','Th','Fr','Sa'];
    h += '<div style="display:flex;gap:.35rem;margin:.3rem 0">';
    d.workout_week_grid.forEach(function(w) {
      const day = days[new Date(w.date + 'T12:00:00').getDay()];
      const bg  = w.done ? 'rgba(74,222,128,.15)' : '#172c43';
      const fc  = w.done ? '#4ade80' : '#6b8099';
      const brd = w.done ? '#4ade80' : '#1e3a52';
      h += '<div style="width:22px;height:22px;border-radius:5px;border:1px solid ' + brd + ';background:' + bg + ';display:flex;align-items:center;justify-content:center;font-size:.63rem;color:' + fc + '">' +
        (w.done ? '✓' : day) + '</div>';
    });
    h += '</div>';
  }

  if (d.weight_history && d.weight_history.length >= 2) {
    h += sec('Weight Trend (recent)');
    const vals = d.weight_history.map(function(w) { return parseFloat(w.value); });
    h += sparkline(vals, d.weight_history.map(function(w) { return w.date.slice(5); }));
  }

  if (d.recent_logs && d.recent_logs.length) {
    h += sec('Recent Logs');
    d.recent_logs.slice(0, 12).forEach(function(l) {
      h += '<div class="log-row">' +
        '<span class="log-d">' + esc((l.date||'').slice(5,10)) + '</span>' +
        '<span class="log-m">' + esc(l.metric||'') + '</span>' +
        '<span class="log-v">' + esc(String(l.value||'').slice(0,55)) + '</span></div>';
    });
  }
  return h;
}

async function renderFinance() {
  const d = await get('/api/finance');
  let h = '';
  if (d.net_worth && d.net_worth !== '—') h += kv('Net worth', d.net_worth);
  h += kv('Profile updated', d.profile_updated || '—');
  h += kv('Last bonus scan', d.last_bonus_scan || '—');

  const cat = d.budget_by_category || {};
  const catKeys = Object.keys(cat).sort(function(a,b){ return cat[b]-cat[a]; });
  if (catKeys.length) {
    h += sec('This Month by Category');
    const total = catKeys.reduce(function(s,k){ return s+cat[k]; }, 0);
    catKeys.forEach(function(k) {
      const pct = Math.round(cat[k]/total*100);
      h += progressBar(k, cat[k], total, '$');
    });
  } else {
    h += '<div style="font-size:.75rem;color:#6b8099;padding:.5rem 0">No budget entries logged this month.</div>';
  }

  if (d.last_offers && d.last_offers.length) {
    h += sec('Last Elevated Offers');
    d.last_offers.forEach(function(o) {
      const name = typeof o === 'string' ? o : (o.card || o.name || JSON.stringify(o));
      h += '<div style="padding:.4rem 0;border-bottom:1px solid #1e3a52;font-size:.78rem">🎯 ' + esc(name) + '</div>';
    });
  }

  if (d.recent_budget && d.recent_budget.length) {
    h += sec('Recent Entries');
    d.recent_budget.slice().reverse().slice(0,6).forEach(function(b) {
      h += kv((b.category||'?') + ' · ' + (b.date||'').slice(5,10), '$' + (b.amount||'?') + (b.note ? ' — ' + b.note.slice(0,25) : ''));
    });
  }
  return h;
}

async function renderMarket() {
  const d = await get('/api/market');
  const cmap = {green:'#4ade80',yellow:'#fbbf24',orange:'#fb923c',gray:'#6b8099'};
  const c = cmap[d.color] || '#6b8099';
  let h = kv('Session', '<span style="color:' + c + ';font-weight:700">' + esc(d.session) + '</span>');
  h += kv('Time', d.time_et || '—');
  if (d.next_open) h += kv('Next open', d.next_open);

  const stocks = d.stocks || [];
  if (stocks.length) {
    h += sec('Watchlist');
    h += '<div class="stock-grid">';
    stocks.forEach(function(s) {
      if (!s.price) {
        h += '<div class="stock"><div class="stock-t">' + esc(s.ticker) + '</div><div style="font-size:.7rem;color:#6b8099">No data</div></div>';
        return;
      }
      const up   = (s.change_pct || 0) >= 0;
      const sign = up ? '+' : '';
      const pctPos = s.pos_pct != null ? s.pos_pct : null;
      h += '<div class="stock">' +
        '<div class="stock-t">' + esc(s.ticker) + '</div>' +
        '<div class="stock-p">$' + s.price + '</div>' +
        '<div class="stock-c ' + (up?'up':'dn') + '">' + sign + (s.change_pct != null ? s.change_pct + '%' : '—') + '</div>' +
        (pctPos != null ? '<div class="range-bar"><div class="range-dot" style="left:' + pctPos + '%"></div></div>' +
          '<div class="range-lbl"><span>$' + s.week52_low + '</span><span>$' + s.week52_high + '</span></div>' : '') +
        '</div>';
    });
    h += '</div>';
    if (d.fetched_at) h += '<div style="margin-top:.6rem;font-size:.62rem;color:#6b8099">Prices cached 5 min · ' + new Date(d.fetched_at).toLocaleTimeString() + '</div>';
  }
  return h;
}

async function renderCalendar() {
  const d = await get('/api/calendar');
  if (!d.configured) return '<div class="empty">Google Calendar not connected.</div>';
  const events = d.events || [];
  if (!events.length) return '<div class="empty">No events in the next 7 days.</div>';

  let h = kv('Today', d.today_count || 0) + kv('Tomorrow', d.tomorrow_count || 0);

  // Group by date
  const groups = {};
  events.forEach(function(e) {
    const day = (e.start && (e.start.dateTime || e.start.date) || '').slice(0,10);
    if (!groups[day]) groups[day] = [];
    groups[day].push(e);
  });

  const today = new Date().toISOString().slice(0,10);
  const tom   = new Date(Date.now()+86400000).toISOString().slice(0,10);

  Object.keys(groups).sort().forEach(function(day) {
    const label = day===today ? 'Today' : day===tom ? 'Tomorrow' :
      new Date(day+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    h += sec(label);
    groups[day].forEach(function(e) {
      const raw = e.start && (e.start.dateTime || e.start.date) || '';
      let timeStr = e.start && e.start.dateTime ? '' : 'All day';
      if (e.start && e.start.dateTime) {
        try {
          const s  = new Date(raw);
          const en = new Date(e.end && (e.end.dateTime || e.end.date) || raw);
          timeStr = s.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) +
            ' – ' + en.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
        } catch(x) { timeStr = raw.slice(11,16); }
      }
      h += '<div class="ev"><div class="ev-name">' + esc(e.summary||'Untitled') + '</div>' +
        '<div class="ev-time">' + esc(timeStr) + '</div>' +
        (e.location ? '<div class="ev-loc">📍 ' + esc(e.location.slice(0,55)) + '</div>' : '') +
        (e.html_link ? '<div style="margin-top:.1rem"><a href="' + e.html_link + '" target="_blank" style="font-size:.66rem">Open in Calendar ↗</a></div>' : '') +
        '</div>';
    });
  });
  return h;
}

async function renderEmail() {
  const d = await get('/api/email');
  if (!d.configured) return '<div class="empty">Gmail not connected.</div>';
  if (!d.total_count) return '<div class="empty">Inbox zero 🎉</div>';

  let h = kv('Total unread', d.total_count);
  if (d.urgent_count) h += kv('Urgent 🔴', '<span style="color:#f87171;font-weight:700">' + d.urgent_count + '</span>');

  (d.accounts || []).forEach(function(acct) {
    if (!acct.unread || !acct.unread.length) return;
    h += sec(acct.address + ' (' + acct.count + ')');
    acct.unread.slice(0,8).forEach(function(m) {
      const urg = m.urgency===2 ? '🔴' : m.urgency===1 ? '🟡' : '⚪';
      h += '<div class="email-row">' +
        '<div class="urg">' + urg + '</div>' +
        '<div style="overflow:hidden;min-width:0">' +
          '<div class="email-subj">' + esc((m.subject||'(no subject)').slice(0,55)) + '</div>' +
          '<div class="email-from">' + esc((m.from||'').slice(0,45)) + '</div>' +
        '</div></div>';
    });
  });
  return h;
}

async function renderTravel() {
  const d = await get('/api/travel');
  if (!d.live) return '<div class="empty">No live flight data yet.<br>Tracker runs Mon/Wed/Fri 8AM ET</div>' +
    '<div style="margin-top:.75rem">' + kv('GitHub', '<a href="https://github.com/jng-ai/flight-tracker" target="_blank">jng-ai/flight-tracker ↗</a>') + '</div>';

  let h = kv('Last scan', d.last_updated ? new Date(d.last_updated).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '—');
  h += kv('Steals 🔥', '<span style="color:#fbbf24;font-weight:700">' + (d.steals||0) + '</span>');
  h += kv('Deals 🔔', d.alerts||0);
  h += kv('Award space ✨', '<span style="color:#a78bfa">' + (d.awards||0) + '</span>');

  const deals = d.deals || [];
  if (deals.length) {
    h += sec('Top Deals');
    deals.forEach(function(deal) {
      const icon = deal.priority==='steal'?'🔥':deal.priority==='alert'?'🔔':'✨';
      h += '<div style="padding:.6rem 0;border-bottom:1px solid #1e3a52">' +
        '<div style="font-size:.8rem;font-weight:600">' + icon + ' ' + esc(deal.route||'') +
        ' — <span style="color:#fbbf24">' + esc(deal.price||'') + '</span>' +
        (deal.pctUnder>0 ? ' <span style="color:#4ade80;font-size:.65rem">↓' + deal.pctUnder + '% avg</span>' : '') + '</div>' +
        '<div style="font-size:.67rem;color:#6b8099;margin-top:.15rem">' + esc((deal.meta||'').slice(0,80)) + '</div>' +
        (deal.booking_url ? '<a href="' + deal.booking_url + '" target="_blank" style="font-size:.66rem">Book →</a>' : '') +
        '</div>';
    });
  }
  return h;
}

async function renderFollowup() {
  const d = await get('/api/followups');
  const pending = d.pending || [], overdue = d.overdue || [], upcoming = d.upcoming || [];
  if (!pending.length) return '<div class="empty">No pending follow-ups ✅</div>';

  let h = kv('Total', pending.length) + kv('Overdue', '<span style="color:#fbbf24;font-weight:700">' + overdue.length + '</span>');
  if (overdue.length) {
    h += sec('⚠️ Overdue');
    overdue.forEach(function(f) {
      h += '<div class="ev"><div class="ev-name">' + esc(f.contact||'?') + '</div>' +
        '<div class="ev-time">Due ' + esc(f.due_date||'?') + ' · ' + esc(f.type||'follow-up') + '</div>' +
        (f.context ? '<div class="ev-loc">' + esc(f.context.slice(0,65)) + '</div>' : '') + '</div>';
    });
  }
  if (upcoming.length) {
    h += sec('Upcoming');
    upcoming.slice(0,6).forEach(function(f) {
      h += '<div class="ev"><div class="ev-name">' + esc(f.contact||'?') + '</div>' +
        '<div class="ev-time">Due ' + esc(f.due_date||'?') + '</div>' +
        (f.context ? '<div class="ev-loc">' + esc(f.context.slice(0,55)) + '</div>' : '') + '</div>';
    });
  }
  return h;
}

async function renderBonus() {
  const d = await get('/api/bonus');
  let h = kv('Last scan', d.last_scan ? new Date(d.last_scan).toLocaleDateString() : 'Never');
  h += kv('Elevated offers found', '<span style="color:' + (d.last_count?'#4ade80':'#6b8099') + ';font-weight:700">' + (d.last_count||0) + '</span>');

  if (d.last_offers && d.last_offers.length) {
    h += sec('Last Elevated Offers');
    d.last_offers.forEach(function(o) {
      const name = typeof o==='string' ? o : (o.card||o.name||JSON.stringify(o));
      h += '<div style="padding:.4rem 0;border-bottom:1px solid #1e3a52;font-size:.78rem">🎯 ' + esc(name) + '</div>';
    });
  } else {
    h += '<div style="font-size:.75rem;color:#6b8099;padding:.5rem 0">No elevated offers on last scan.<br>Ask Agent below to run a fresh scan.</div>';
  }
  return h;
}

async function renderSocial() {
  const d = await get('/api/social');
  const events = d.events || [];
  if (!events.length) return '<div class="empty">No cached events.<br>Runs Tue/Fri 9 AM — or ask agent below.</div>';

  let h = kv('Events cached', events.length);
  if (d.cached_at) h += kv('Last scan', new Date(d.cached_at).toLocaleDateString());
  h += sec('Upcoming Events');
  events.slice(0,10).forEach(function(e) {
    h += '<div class="ev"><div class="ev-name">' + esc(e.name||e.title||'?') + '</div>' +
      '<div class="ev-time">' + esc(e.date||'') + (e.venue?' · '+esc(e.venue):'') + '</div>' +
      (e.cost ? '<div class="ev-loc">💰 ' + esc(e.cost) + '</div>' : '') +
      (e.url ? '<div><a href="' + e.url + '" target="_blank" style="font-size:.66rem">RSVP ↗</a></div>' : '') +
      '</div>';
  });
  return h;
}

async function renderMortgage() {
  const d = await get('/api/mortgage');
  const listings = d.listings || [];
  if (!listings.length) return '<div class="empty">No cached listings.<br>Ask agent below to scan Paperstac.</div>';

  let h = kv('Listings', listings.length);
  if (d.last_scan) h += kv('Last scan', new Date(d.last_scan).toLocaleDateString());
  const strong = listings.filter(function(l){ return (l.rating||'').toUpperCase()==='STRONG'; }).length;
  if (strong) h += kv('STRONG rated', '<span style="color:#4ade80;font-weight:700">' + strong + '</span>');

  h += sec('Listings');
  listings.filter(function(l){ return ['STRONG','GOOD'].includes((l.rating||'').toUpperCase()); }).forEach(function(l) {
    const rc = l.rating?.toUpperCase()==='STRONG' ? '#4ade80' : '#fbbf24';
    h += '<div style="padding:.55rem 0;border-bottom:1px solid #1e3a52">' +
      '<div style="display:flex;justify-content:space-between;font-size:.78rem;font-weight:600">' +
        '<span>🏠 ' + esc(l.state||'?') + ' · $' + (l.upb||'?') + '</span>' +
        '<span style="color:' + rc + '">' + esc(l.rating||'') + '</span>' +
      '</div>' +
      '<div style="font-size:.67rem;color:#6b8099;margin-top:.12rem">Ask $' + (l.ask||'?') +
        (l.discount_pct!=null?' · '+l.discount_pct+'% disc':'') +
        (l.yield_est?' · ~'+l.yield_est+'% yield':'') + '</div>' +
      (l.url ? '<a href="' + l.url + '" target="_blank" style="font-size:.66rem">View →</a>' : '') +
      '</div>';
  });
  return h;
}

async function renderInvestment() {
  const d = await get('/api/investment');
  const stocks = d.stocks || [];
  if (!stocks.length) return '<div class="empty">No price data.<br>' + (d.error||'yfinance unavailable') + '</div>';

  const up   = stocks.filter(function(s){ return (s.change_pct||0)>=0; }).length;
  const down = stocks.filter(function(s){ return (s.change_pct||0)<0;  }).length;
  let h = kv('Watchlist', (d.watchlist||[]).join(', '));
  h += kv('Today', '<span style="color:#4ade80">▲ ' + up + '</span>  <span style="color:#f87171">▼ ' + down + '</span>');

  h += sec('Prices');
  h += '<div class="stock-grid">';
  stocks.forEach(function(s) {
    if (!s.price) {
      h += '<div class="stock"><div class="stock-t">' + esc(s.ticker) + '</div><div style="font-size:.7rem;color:#6b8099">No data</div></div>';
      return;
    }
    const up2  = (s.change_pct||0) >= 0;
    const sign = up2 ? '+' : '';
    h += '<div class="stock">' +
      '<div class="stock-t">' + esc(s.ticker) + '</div>' +
      '<div class="stock-p">$' + s.price + '</div>' +
      '<div class="stock-c ' + (up2?'up':'dn') + '">' + sign + (s.change_pct!=null?s.change_pct+'%':'—') + '</div>' +
      (s.pos_pct!=null ?
        '<div class="range-bar"><div class="range-dot" style="left:' + s.pos_pct + '%"></div></div>' +
        '<div class="range-lbl"><span>$' + s.week52_low + '</span><span>$' + s.week52_high + '</span></div>'
        : '') +
      '</div>';
  });
  h += '</div>';
  if (d.fetched_at) h += '<div style="margin-top:.6rem;font-size:.62rem;color:#6b8099">Cached 5 min · ' + new Date(d.fetched_at).toLocaleTimeString() + '</div>';
  return h;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function kv(k, v) {
  return '<div class="kv"><span class="k">' + k + '</span><span class="v">' + v + '</span></div>';
}
function sec(label) {
  return '<div class="section">' + esc(label) + '</div>';
}
function progressBar(label, val, max, unit) {
  unit = unit || '';
  const pct = max ? Math.min(100, Math.round(val/max*100)) : 0;
  const cls = pct >= 75 ? '' : 'warn';
  return '<div class="pbar-wrap">' +
    '<div class="pbar-label"><span>' + esc(label) + '</span><strong>' + val + unit + ' / ' + max + unit + '</strong></div>' +
    '<div class="pbar-bg"><div class="pbar-fill ' + cls + '" style="width:' + pct + '%"></div></div></div>';
}
function shimmer(n) {
  return Array(n).fill(0).map(function(_,i) {
    return '<div class="shimmer" style="width:' + [100,70,85,55,90][i%5] + '%"></div>';
  }).join('');
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function sparkline(vals, labels) {
  if (vals.length < 2) return '';
  const W=200, H=36;
  const min=Math.min.apply(null,vals), max=Math.max.apply(null,vals);
  const range = max-min || 1;
  const pts = vals.map(function(v,i) {
    return (i/(vals.length-1)*W).toFixed(1) + ',' + (H-((v-min)/range*(H-4))-2).toFixed(1);
  }).join(' ');
  const trend = vals[vals.length-1] < vals[0] ? '#4ade80' : vals[vals.length-1] > vals[0] ? '#f87171' : '#6b8099';
  const svg = '<svg width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '" style="overflow:visible;display:block;margin:.3rem 0">' +
    '<polygon points="0,' + H + ' ' + pts + ' ' + W + ',' + H + '" fill="' + trend + '" opacity="0.1"/>' +
    '<polyline points="' + pts + '" fill="none" stroke="' + trend + '" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>' +
    '</svg>';
  if (labels && labels.length === vals.length) {
    return svg + '<div style="display:flex;justify-content:space-between;font-size:.58rem;color:#6b8099">' +
      '<span>' + esc(labels[0]) + '</span><span>' + esc(labels[labels.length-1]) + '</span></div>';
  }
  return svg;
}

// ── Countdown ──────────────────────────────────────────────────────────────────
function resetCountdown() {
  countdown = REFRESH_SEC;
  document.getElementById('prog-count').textContent = countdown;
  document.getElementById('prog-fill').style.width = '100%';
}
function startCountdown() {
  if (timer) clearInterval(timer);
  timer = setInterval(function() {
    countdown = Math.max(0, countdown - 1);
    document.getElementById('prog-count').textContent = countdown;
    document.getElementById('prog-fill').style.width = (countdown / REFRESH_SEC * 100).toFixed(1) + '%';
    if (countdown === 0) loadSummary();
  }, 1000);
}

loadSummary();
startCountdown();
</script>
