<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Executive AI Dashboard</title>
  <style>
    :root {
      --bg:       #060d18;
      --surface:  #0d1f2d;
      --surface2: #132433;
      --border:   #1e3a52;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --accent:   #38bdf8;
      --green:    #4ade80;
      --yellow:   #fbbf24;
      --orange:   #fb923c;
      --red:      #f87171;
      --purple:   #a78bfa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      padding-bottom: 2rem;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: .03em;
    }
    header h1 span { color: var(--accent); }
    #server-time {
      font-size: .7rem;
      color: var(--muted);
      font-family: monospace;
    }
    #refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: .3rem .6rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: .75rem;
    }
    #refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Main grid ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem;
    }

    /* ── Agent grid ── */
    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: .75rem;
    }

    /* ── Agent card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.1rem;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      position: relative;
    }
    .card:hover { border-color: var(--accent); background: var(--surface2); }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .5rem;
    }
    .card-title {
      display: flex;
      align-items: center;
      gap: .45rem;
      font-size: .85rem;
      font-weight: 600;
    }
    .card-icon { font-size: 1.1rem; }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.ok     { background: var(--green); }
    .status-dot.warn   { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
    .status-dot.gray   { background: var(--muted); }
    .status-dot.green  { background: var(--green); }
    .status-dot.yellow { background: var(--yellow); }
    .status-dot.orange { background: var(--orange); }
    .card-summary {
      font-size: .78rem;
      color: var(--muted);
      line-height: 1.4;
    }
    .card-detail {
      font-size: .72rem;
      color: var(--accent);
      margin-top: .3rem;
      font-family: monospace;
    }

    /* ── Deal badges ── */
    .deal-list { margin-top: .5rem; }
    .deal-item {
      font-size: .7rem;
      color: var(--text);
      padding: .2rem 0;
      border-top: 1px solid var(--border);
      display: flex;
      gap: .4rem;
      align-items: baseline;
    }
    .deal-route { font-weight: 600; }
    .deal-price { color: var(--yellow); }
    .deal-meta  { color: var(--muted); font-size: .65rem; }

    /* ── Section headers ── */
    .section-label {
      font-size: .65rem;
      letter-spacing: .1em;
      color: var(--accent);
      font-family: monospace;
      text-transform: uppercase;
      margin: 1.25rem 0 .5rem;
    }

    /* ── Detail panel (slide-in) ── */
    #detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 200;
      backdrop-filter: blur(2px);
    }
    #detail-panel {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: min(420px, 100vw);
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      z-index: 201;
      padding: 1.25rem;
      transform: translateX(100%);
      transition: transform .2s ease;
    }
    #detail-panel.open { transform: translateX(0); }
    #detail-overlay.open { display: block; }
    #detail-close {
      position: absolute;
      top: 1rem; right: 1rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 28px; height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: .9rem;
      display: flex; align-items: center; justify-content: center;
    }
    #detail-close:hover { color: var(--text); border-color: var(--text); }
    #detail-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; padding-right: 2rem; }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: .45rem 0;
      border-bottom: 1px solid var(--border);
      font-size: .8rem;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-key   { color: var(--muted); }
    .detail-value { font-weight: 500; text-align: right; max-width: 60%; }

    /* Progress bar */
    .progress-wrap { width: 100%; background: var(--border); border-radius: 4px; height: 6px; margin-top: 4px; }
    .progress-fill { height: 6px; border-radius: 4px; background: var(--green); transition: width .4s; }
    .progress-fill.warn { background: var(--yellow); }

    /* Log list */
    .log-list { margin-top: .75rem; }
    .log-item {
      font-size: .72rem;
      padding: .35rem 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: .6rem;
    }
    .log-date  { color: var(--muted); white-space: nowrap; flex-shrink: 0; }
    .log-metric { color: var(--accent); text-transform: capitalize; white-space: nowrap; flex-shrink: 0; }
    .log-value { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Auto-refresh indicator */
    #refresh-indicator {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .4rem .75rem;
      font-size: .68rem;
      color: var(--muted);
      font-family: monospace;
    }

    /* Loading shimmer */
    .shimmer {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
      height: .8rem;
      margin: .3rem 0;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* Health progress */
    .metric-row { margin: .5rem 0; }
    .metric-label { font-size: .72rem; color: var(--muted); display: flex; justify-content: space-between; margin-bottom: 3px; }

    @media (max-width: 480px) {
      .agent-grid { grid-template-columns: 1fr; }
      #detail-panel { width: 100vw; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>⚡ <span>Executive AI</span> Dashboard</h1>
    <div id="server-time">Loading...</div>
  </div>
  <button id="refresh-btn" onclick="loadAll()">↻ Refresh</button>
</header>

<main>
  <div class="section-label">Agents</div>
  <div class="agent-grid" id="agent-grid">
    <!-- filled by JS -->
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:60%"></div></div>
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:60%"></div></div>
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:60%"></div></div>
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:60%"></div></div>
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:60%"></div></div>
    <div class="card"><div class="shimmer"></div><div class="shimmer" style="width:60%"></div></div>
  </div>
</main>

<!-- Detail panel -->
<div id="detail-overlay" onclick="closeDetail()"></div>
<div id="detail-panel">
  <button id="detail-close" onclick="closeDetail()">✕</button>
  <div id="detail-title"></div>
  <div id="detail-body"></div>
</div>

<div id="refresh-indicator">Auto-refresh in <span id="countdown">30</span>s</div>

<script>
const AGENTS_ORDER = [
  "health","finance","market","calendar","email","travel","followup","bonus","social","mortgage","infusion"
];

let summaryData = null;
let countdown = 30;
let countdownInterval = null;

// ── Load all data ────────────────────────────────────────────────────────────
async function loadAll() {
  try {
    const res = await fetch("/api/summary");
    summaryData = await res.json();
    document.getElementById("server-time").textContent = summaryData.server_time;
    renderGrid(summaryData.agents);
    resetCountdown();
  } catch(e) {
    console.error("Failed to load summary", e);
  }
}

// ── Render agent cards ───────────────────────────────────────────────────────
function renderGrid(agents) {
  const grid = document.getElementById("agent-grid");
  grid.innerHTML = "";
  AGENTS_ORDER.forEach(key => {
    const a = agents[key];
    if (!a) return;
    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => openDetail(key, a);

    let extra = "";
    if (key === "travel" && a.deals && a.deals.length) {
      extra = `<div class="deal-list">${a.deals.slice(0,3).map(d => `
        <div class="deal-item">
          <span>${d.priority==="steal"?"🔥":d.priority==="alert"?"🔔":"✨"}</span>
          <span class="deal-route">${d.route||""}</span>
          <span class="deal-price">${d.price||""}</span>
        </div>`).join("")}</div>`;
    }
    if (key === "health" && a.last_weight) {
      extra = `<div class="card-detail">⚖️ ${a.last_weight} → goal ${a.weight_goal}</div>`;
    }
    if (key === "followup" && a.overdue && a.overdue.length) {
      extra = `<div class="card-detail" style="color:var(--yellow)">⚠️ ${a.overdue[0].contact} — ${(a.overdue[0].context||"").slice(0,35)}</div>`;
    }

    card.innerHTML = `
      <div class="card-header">
        <div class="card-title">
          <span class="card-icon">${a.icon}</span>
          <span>${a.label}</span>
        </div>
        <div class="status-dot ${a.status}"></div>
      </div>
      <div class="card-summary">${a.summary}</div>
      ${extra}
    `;
    grid.appendChild(card);
  });
}

// ── Detail panel ─────────────────────────────────────────────────────────────
async function openDetail(key, agentData) {
  const panel = document.getElementById("detail-panel");
  const overlay = document.getElementById("detail-overlay");
  document.getElementById("detail-title").textContent = `${agentData.icon} ${agentData.label}`;
  document.getElementById("detail-body").innerHTML = "<div class='shimmer'></div><div class='shimmer' style='width:70%'></div>";

  panel.classList.add("open");
  overlay.classList.add("open");

  try {
    let html = "";
    if (key === "health") {
      const d = await fetch("/api/health").then(r=>r.json());
      html = renderHealthDetail(d);
    } else if (key === "travel") {
      const d = await fetch("/api/travel").then(r=>r.json());
      html = renderTravelDetail(d);
    } else if (key === "followup") {
      const d = await fetch("/api/followups").then(r=>r.json());
      html = renderFollowupDetail(d);
    } else if (key === "calendar") {
      const d = await fetch("/api/calendar").then(r=>r.json());
      html = renderCalendarDetail(d);
    } else if (key === "email") {
      const d = await fetch("/api/email").then(r=>r.json());
      html = renderEmailDetail(d);
    } else if (key === "finance") {
      const d = await fetch("/api/finance").then(r=>r.json());
      html = renderFinanceDetail(d);
    } else if (key === "tasks") {
      const d = await fetch("/api/tasks").then(r=>r.json());
      html = renderTasksDetail(d);
    } else {
      html = renderGenericDetail(agentData);
    }
    document.getElementById("detail-body").innerHTML = html;
  } catch(e) {
    document.getElementById("detail-body").innerHTML = `<p style="color:var(--muted);font-size:.8rem">Could not load detail: ${e.message}</p>`;
  }
}

function closeDetail() {
  document.getElementById("detail-panel").classList.remove("open");
  document.getElementById("detail-overlay").classList.remove("open");
}

// ── Detail renderers ──────────────────────────────────────────────────────────
function row(key, value, style="") {
  return `<div class="detail-row"><span class="detail-key">${key}</span><span class="detail-value" style="${style}">${value}</span></div>`;
}

function renderHealthDetail(d) {
  const workoutPct = Math.min(100, Math.round((d.workouts_week / d.workout_goal) * 100));
  const wColor = workoutPct >= 75 ? "" : "warn";
  let html = `
    ${d.last_weight ? row("Last weight", d.last_weight.value + " lbs · " + d.last_weight.date) : ""}
    ${row("Weight goal", "165 lbs")}
    ${d.last_sleep ? row("Last sleep", d.last_sleep.value + "h · " + d.last_sleep.date) : ""}
    ${row("Sleep goal", "7.5h/night")}
    ${row("Meals today", d.meals_today)}
    <div class="metric-row">
      <div class="metric-label"><span>Workouts this week</span><span>${d.workouts_week}/${d.workout_goal}</span></div>
      <div class="progress-wrap"><div class="progress-fill ${wColor}" style="width:${workoutPct}%"></div></div>
    </div>
    <div style="margin-top:1rem;font-size:.72rem;color:var(--muted);margin-bottom:.4rem;letter-spacing:.05em">RECENT LOGS</div>
    <div class="log-list">
      ${(d.recent_logs||[]).slice(0,15).map(l=>`
        <div class="log-item">
          <span class="log-date">${(l.date||"").slice(5,10)}</span>
          <span class="log-metric">${l.metric||""}</span>
          <span class="log-value">${(l.value||"").slice(0,60)}</span>
        </div>`).join("")}
    </div>`;
  return html;
}

function renderTravelDetail(d) {
  if (!d.live) return `<p style="color:var(--muted);font-size:.8rem">No live data yet. Flight tracker runs Mon/Wed/Fri 8AM EST.</p>
    <div style="margin-top:1rem">${row("Tracker", '<a href="https://github.com/jng-ai/flight-tracker" style="color:var(--accent)" target="_blank">jng-ai/flight-tracker</a>')}</div>`;
  const deals = d.deals || [];
  let html = `
    ${row("Last scan", d.last_updated ? new Date(d.last_updated).toLocaleString() : "—")}
    ${row("Steals 🔥", d.steals || 0, d.steals ? "color:var(--yellow)" : "")}
    ${row("Deals 🔔", d.alerts || 0)}
    ${row("Award space ✨", d.awards || 0, "color:var(--purple)")}
    ${row("Routes searched", (d.searched_routes||[]).length)}`;
  if (deals.length) {
    html += `<div style="margin-top:1rem;font-size:.72rem;color:var(--muted);margin-bottom:.4rem;letter-spacing:.05em">TOP DEALS</div>`;
    deals.forEach(d => {
      const badge = d.priority==="steal"?"🔥":d.priority==="alert"?"🔔":"✨";
      const pct = d.pctUnder > 0 ? ` <span style="color:var(--green);font-size:.65rem">${d.pctUnder}% under</span>` : "";
      html += `<div class="detail-row" style="flex-direction:column;align-items:flex-start;gap:.2rem">
        <div style="font-size:.78rem;font-weight:600">${badge} ${d.route} — <span style="color:var(--yellow)">${d.price}</span>${pct}</div>
        <div style="font-size:.68rem;color:var(--muted)">${(d.meta||"").slice(0,60)}</div>
      </div>`;
    });
  }
  html += `<div style="margin-top:1rem">${row("Repo", '<a href="https://github.com/jng-ai/flight-tracker" style="color:var(--accent)" target="_blank">jng-ai/flight-tracker ↗</a>')}</div>`;
  return html;
}

function renderFollowupDetail(d) {
  let html = `${row("Total pending", d.pending.length)} ${row("Overdue", d.overdue.length, d.overdue.length ? "color:var(--yellow)" : "")}`;
  if (d.overdue.length) {
    html += `<div style="margin-top:1rem;font-size:.72rem;color:var(--red);margin-bottom:.4rem">⚠️ OVERDUE</div>`;
    d.overdue.forEach(f => {
      html += `<div class="detail-row" style="flex-direction:column;align-items:flex-start;gap:.2rem">
        <div style="font-size:.78rem;font-weight:600">${f.contact||"?"}</div>
        <div style="font-size:.68rem;color:var(--muted)">${(f.context||"").slice(0,60)} · due ${f.due_date||"?"}</div>
      </div>`;
    });
  }
  if (d.upcoming.length) {
    html += `<div style="margin-top:1rem;font-size:.72rem;color:var(--muted);margin-bottom:.4rem;letter-spacing:.05em">UPCOMING</div>`;
    d.upcoming.slice(0,5).forEach(f => {
      html += `<div class="detail-row">
        <span class="detail-key">${f.due_date||"?"} · ${f.contact||"?"}</span>
        <span class="detail-value" style="font-size:.7rem">${(f.context||"").slice(0,35)}</span>
      </div>`;
    });
  }
  return html || `<p style="color:var(--muted);font-size:.8rem">No pending follow-ups ✅</p>`;
}

function renderCalendarDetail(d) {
  if (!d.configured) return `<p style="color:var(--muted);font-size:.8rem">Google Calendar not connected.</p>`;
  if (!d.events || !d.events.length) return `<p style="color:var(--muted);font-size:.8rem">No events in the next 7 days.</p>`;
  let html = `<div style="font-size:.72rem;color:var(--muted);margin-bottom:.5rem">Next 7 days</div>`;
  d.events.forEach(e => {
    const start = e.start?.dateTime || e.start?.date || "";
    let label = start;
    try {
      const dt = new Date(start);
      label = dt.toLocaleDateString("en-US", {weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
    } catch {}
    html += `<div class="detail-row" style="flex-direction:column;align-items:flex-start;gap:.15rem">
      <div style="font-size:.78rem;font-weight:600">${e.summary||"Untitled"}</div>
      <div style="font-size:.68rem;color:var(--muted)">${label}${e.location ? " · " + e.location.slice(0,40) : ""}</div>
    </div>`;
  });
  return html;
}

function renderEmailDetail(d) {
  if (!d.configured) return `<p style="color:var(--muted);font-size:.8rem">Gmail not connected.</p>`;
  let html = row("Unread count", `${d.count}${d.count===20?"+":""}`);
  if (d.unread && d.unread.length) {
    html += `<div style="margin-top:1rem;font-size:.72rem;color:var(--muted);margin-bottom:.4rem;letter-spacing:.05em">RECENT UNREAD</div>`;
    d.unread.slice(0,8).forEach(m => {
      html += `<div class="detail-row" style="flex-direction:column;align-items:flex-start;gap:.15rem">
        <div style="font-size:.75rem;font-weight:600">${(m.subject||"(no subject)").slice(0,50)}</div>
        <div style="font-size:.68rem;color:var(--muted)">${(m.from||"").slice(0,40)}</div>
      </div>`;
    });
  }
  return html;
}

function renderFinanceDetail(d) {
  return `
    ${d.net_worth !== "—" ? row("Net worth snapshot", d.net_worth) : ""}
    ${row("Profile updated", d.profile_updated)}
    ${row("Last bonus scan", d.last_bonus_scan)}
    ${d.recent_budget.length ? `
      <div style="margin-top:1rem;font-size:.72rem;color:var(--muted);margin-bottom:.4rem;letter-spacing:.05em">RECENT BUDGET LOGS</div>
      ${[...d.recent_budget].reverse().slice(0,6).map(b=>`
        <div class="detail-row">
          <span class="detail-key">${b.category||"?"} · ${(b.date||"").slice(5,10)}</span>
          <span class="detail-value">$${b.amount||"?"} — ${(b.note||"").slice(0,30)}</span>
        </div>`).join("")}` : ""}`;
}

function renderGenericDetail(a) {
  return `
    <div class="detail-row"><span class="detail-key">Status</span><span class="detail-value">${a.summary}</span></div>
    ${a.last_scan ? `<div class="detail-row"><span class="detail-key">Last scan</span><span class="detail-value">${a.last_scan}</span></div>` : ""}
    <p style="margin-top:1.5rem;font-size:.75rem;color:var(--muted)">Use Telegram to interact with this agent.</p>`;
}

// ── Countdown + auto-refresh ──────────────────────────────────────────────────
function resetCountdown() {
  countdown = 30;
  document.getElementById("countdown").textContent = countdown;
}

function startCountdown() {
  countdownInterval = setInterval(() => {
    countdown--;
    document.getElementById("countdown").textContent = countdown;
    if (countdown <= 0) {
      loadAll();
    }
  }, 1000);
}

// ── Init ─────────────────────────────────────────────────────────────────────
loadAll();
startCountdown();
</script>
</body>
</html>
