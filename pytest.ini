[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --cov=core
    --cov=agents
    --cov=integrations/google/auth
    --cov=integrations/telegram/dashboard
    --cov-report=term-missing
    --cov-report=html:htmlcov
    -v
asyncio_mode = auto
